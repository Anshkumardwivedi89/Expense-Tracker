# =============================================
# PRODUCTION CONFIGURATION
# =============================================
# Use ONLY environment variables (never hardcode secrets)
# Set these variables in your deployment platform (Render, Heroku, etc)

# =============================================
# Server Configuration
# =============================================
spring.application.name=Expense-Tracker
server.port=${PORT:8080}

# =============================================
# Database Configuration (MySQL via Aiven)
# =============================================
# DATABASE_URL should be in format: jdbc:mysql://HOST:PORT/DATABASE?sslMode=REQUIRED
# Example: jdbc:mysql://mysql-xxx.aivencloud.com:18164/expense_tracker?sslMode=REQUIRED
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# =============================================
# JPA/Hibernate Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# Spring Boot 3 automatically detects the dialect, no need to configure
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# =============================================
# MongoDB Configuration (User Profiles/Notifications)
# =============================================
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.database=Expense-Tracker

# =============================================
# JWT Configuration
# =============================================
# Generate secret: openssl rand -base64 32
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =============================================
# Email Service Configuration (AWS SES)
# =============================================
# AWS SES is automatically configured via AWS SDK and IAM roles
# No SMTP settings needed - uses AWS SDK directly
app.email.from=${MAIL_FROM_ADDRESS}
app.email.from-name=${MAIL_FROM_NAME:Expense Tracker}
aws.ses.region=${AWS_REGION:us-east-1}

# =============================================
# SMS Configuration (Twilio)
# =============================================
app.sms.provider=twilio
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID}
app.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN}
app.sms.twilio.phone-number=${TWILIO_PHONE_NUMBER}
app.sms.enabled=${SMS_ENABLED:true}

# =============================================
# CORS Configuration (from environment)
# =============================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# =============================================
# Notification Flags
# =============================================
app.notifications.transaction.enabled=true
app.notifications.category.enabled=true
app.notifications.report.enabled=true

# =============================================
# Logging Configuration
# =============================================
logging.level.root=INFO
logging.level.com.example.Expense=INFO
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================
# Jackson Configuration
# =============================================
spring.jackson.serialization.indent-output=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# =============================================
# Actuator Configuration
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
